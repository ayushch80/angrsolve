name: CI

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python3 -m py_compile angrsolve/__init__.py angrsolve/cli.py angrsolve/constraints.py angrsolve/explorer.py angrsolve/inputs.py angrsolve/loader.py angrsolve/output.py angrsolve/utils.py angrsolve.py

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python3 -m pytest tests/test_utils.py tests/test_constraints.py tests/test_cli.py tests/test_output.py -v

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq gcc
      - name: Install Python deps
        run: pip install -r requirements.txt
      - name: Run integration tests
        run: python3 -m pytest tests/test_loader.py tests/test_inputs.py tests/test_explorer.py -v
